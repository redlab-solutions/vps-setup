services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - TAILSCALE_IP=${TAILSCALE_IP}

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Sao_Paulo
      - PASSWORD=${CODESERVER_PASSWORD}
      - HASHED_PASSWORD=
      - SUDO_PASSWORD=
    volumes:
      - /home/lincoln/workspace:/config/workspace
      - codeserver_config:/config

  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-lxqt
    container_name: webtop
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5900:5900"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Sao_Paulo
      - PASSWORD=${WEBTOP_PASSWORD}
    volumes:
      - /home/lincoln/obsidian-vault:/config/obsidian-vault
      - webtop_config:/config
    shm_size: "1gb"

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    ports:
      - "127.0.0.1:20128:20128"
    environment:
      - PORT=20128
      - INITIAL_PASSWORD=${OMNIROUTE_INITIAL_PASSWORD}
      - DATA_DIR=/data
      - APP_LOG_TO_FILE=true
    volumes:
      - ./data/omniroute:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:20128/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  caddy_data:
  caddy_config:
  codeserver_config:
  webtop_config:

