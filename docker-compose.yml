services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - TAILSCALE_IP=${TAILSCALE_IP}

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Sao_Paulo
      - PASSWORD=${CODESERVER_PASSWORD}
      - HASHED_PASSWORD=
      - SUDO_PASSWORD=
    volumes:
      - /home/lincoln/workspace:/config/workspace
      - codeserver_config:/config

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    ports:
      - "127.0.0.1:20128:20128"
    environment:
      - PORT=20128
      - INITIAL_PASSWORD=${OMNIROUTE_INITIAL_PASSWORD}
      - DATA_DIR=/data
      - APP_LOG_TO_FILE=true
      - APP_LOG_RETENTION_DAYS=3
      - APP_LOG_MAX_FILES=5
      - APP_LOG_MAX_FILE_SIZE=10485760
      - CALL_LOG_MAX_ENTRIES=200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data/omniroute:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:20128/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  camofox:
    image: jo-inc/camofox-browser
    container_name: camofox
    restart: unless-stopped
    network_mode: host
    environment:
      - CAMOFOX_PORT=9377
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
  codeserver_config:


